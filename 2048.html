    <script>
        // ----- 2048 CUPCAKES GAME (full logic) -----

        (function() {
            const SIZE = 4;
            let grid = [];
            let score = 0;
            let bestScore = parseInt(localStorage.getItem('cupcakeBest') || '0');
            let gameOver = false;
            let winAchieved = false;
            let keepPlaying = false;
            let history = []; // for undo

            const boardTilesEl = document.getElementById('board-tiles');
            const boardGridEl = document.getElementById('board-grid');
            const scoreEl = document.getElementById('score');
            const bestScoreEl = document.getElementById('best-score');
            const overlayEl = document.getElementById('game-overlay');
            const overlayTitle = document.getElementById('overlay-title');
            const overlayText = document.getElementById('overlay-text');
            const overlayBtn = document.getElementById('overlay-btn');

            // ---- helpers ----
            function createEmptyGrid() {
                return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
            }

            function initGrid() {
                grid = createEmptyGrid();
                addRandomTile();
                addRandomTile();
                gameOver = false;
                winAchieved = false;
                keepPlaying = false;
                overlayEl.hidden = true;
                history = [];
                render();
            }

            function addRandomTile() {
                const empty = [];
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        if (grid[r][c] === 0) empty.push([r, c]);
                    }
                }
                if (empty.length === 0) return false;
                const [r, c] = empty[Math.floor(Math.random() * empty.length)];
                grid[r][c] = Math.random() < 0.9 ? 2 : 4;
                return true;
            }

            function cloneGrid(g) { return g.map(row => [...row]); }

            function gridsEqual(a, b) {
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        if (a[r][c] !== b[r][c]) return false;
                    }
                }
                return true;
            }

            // ---- move logic ----
            function slide(row) {
                // remove zeros, merge, pad
                let arr = row.filter(v => v !== 0);
                let merged = [];
                let i = 0;
                let mergeScore = 0;
                while (i < arr.length) {
                    if (i + 1 < arr.length && arr[i] === arr[i + 1]) {
                        const val = arr[i] * 2;
                        merged.push(val);
                        mergeScore += val;
                        i += 2;
                    } else {
                        merged.push(arr[i]);
                        i++;
                    }
                }
                while (merged.length < SIZE) merged.push(0);
                return { row: merged, score: mergeScore };
            }

            function moveLeft() {
                let moved = false;
                let totalScore = 0;
                const newGrid = cloneGrid(grid);
                for (let r = 0; r < SIZE; r++) {
                    const result = slide(newGrid[r]);
                    if (!gridsEqual([newGrid[r]], [result.row])) moved = true;
                    newGrid[r] = result.row;
                    totalScore += result.score;
                }
                if (moved) {
                    history.push({ grid: cloneGrid(grid), score: score });
                    grid = newGrid;
                    score += totalScore;
                    if (score > bestScore) {
                        bestScore = score;
                        localStorage.setItem('cupcakeBest', String(bestScore));
                    }
                    if (addRandomTile()) {
                        // continue
                    }
                    checkGameState();
                    render();
                    return true;
                }
                return false;
            }

            function moveRight() {
                const rotated = grid.map(row => [...row].reverse());
                const moved = moveLeftOnGrid(rotated);
                if (moved) {
                    grid = rotated.map(row => [...row].reverse());
                    render();
                }
                return moved;
            }

            function moveUp() {
                const trans = grid[0].map((_, col) => grid.map(row => row[col]));
                const moved = moveLeftOnGrid(trans);
                if (moved) {
                    grid = trans[0].map((_, col) => trans.map(row => row[col]));
                    render();
                }
                return moved;
            }

            function moveDown() {
                const trans = grid[0].map((_, col) => grid.map(row => row[col]).reverse());
                const moved = moveLeftOnGrid(trans);
                if (moved) {
                    const reversed = trans.map(row => [...row].reverse());
                    grid = reversed[0].map((_, col) => reversed.map(row => row[col]));
                    render();
                }
                return moved;
            }

            // helper for right/up/down
            function moveLeftOnGrid(g) {
                let moved = false;
                let totalScore = 0;
                const newGrid = cloneGrid(g);
                for (let r = 0; r < SIZE; r++) {
                    const result = slide(newGrid[r]);
                    if (!gridsEqual([newGrid[r]], [result.row])) moved = true;
                    newGrid[r] = result.row;
                    totalScore += result.score;
                }
                if (moved) {
                    history.push({ grid: cloneGrid(grid), score: score });
                    grid = newGrid;
                    score += totalScore;
                    if (score > bestScore) {
                        bestScore = score;
                        localStorage.setItem('cupcakeBest', String(bestScore));
                    }
                    addRandomTile();
                    checkGameState();
                    render();
                    return true;
                }
                return false;
            }

            // ---- check win / lose ----
            function checkGameState() {
                // win: 2048 tile exists
                let has2048 = false;
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        if (grid[r][c] === 2048) has2048 = true;
                    }
                }
                if (has2048 && !winAchieved && !keepPlaying) {
                    winAchieved = true;
                    overlayTitle.textContent = '🎉 You Win!';
                    overlayText.textContent = 'You baked the 2048 Royal Cupcake!';
                    overlayBtn.textContent = 'Keep Playing';
                    overlayEl.hidden = false;
                    overlayBtn.onclick = function() {
                        keepPlaying = true;
                        overlayEl.hidden = true;
                    };
                    return;
                }
                // check lose: no empty cells and no merge possible
                let empty = false;
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        if (grid[r][c] === 0) empty = true;
                    }
                }
                if (!empty) {
                    let canMerge = false;
                    for (let r = 0; r < SIZE; r++) {
                        for (let c = 0; c < SIZE; c++) {
                            const val = grid[r][c];
                            if (c < SIZE - 1 && grid[r][c + 1] === val) canMerge = true;
                            if (r < SIZE - 1 && grid[r + 1][c] === val) canMerge = true;
                        }
                    }
                    if (!canMerge) {
                        gameOver = true;
                        overlayTitle.textContent = '😕 Game Over';
                        overlayText.textContent = 'No more moves available. Try again!';
                        overlayBtn.textContent = 'New Game';
                        overlayEl.hidden = false;
                        overlayBtn.onclick = function() {
                            initGrid();
                        };
                    }
                }
            }

            // ---- render ----
            function render() {
                // grid cells (static)
                boardGridEl.innerHTML = '';
                for (let i = 0; i < SIZE * SIZE; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    boardGridEl.appendChild(cell);
                }
                // tiles
                boardTilesEl.innerHTML = '';
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        const val = grid[r][c];
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        tile.setAttribute('data-value', val || '0');
                        if (val === 0) {
                            tile.textContent = '';
                            tile.style.background = 'transparent';
                            tile.style.boxShadow = 'none';
                        } else {
                            // cupcake emoji based on value (cute)
                            const emojis = {
                                2: '🧁',
                                4: '🧁',
                                8: '🧁',
                                16: '🧁',
                                32: '🧁',
                                64: '🧁',
                                128: '🧁',
                                256: '🧁',
                                512: '🧁',
                                1024: '🧁',
                                2048: '👑🧁'
                            };
                            const label = val >= 2048 ? '👑' : '🧁';
                            tile.textContent = val >= 2048 ? '👑' : '🧁';
                            // tile.style.fontSize = val >= 2048 ? '2.4rem' : '2rem';
                        }
                        boardTilesEl.appendChild(tile);
                    }
                }
                scoreEl.textContent = score;
                bestScoreEl.textContent = bestScore;
            }

            // ---- undo ----
            function undoMove() {
                if (history.length === 0 || gameOver) return;
                const prev = history.pop();
                grid = prev.grid;
                score = prev.score;
                if (winAchieved && !keepPlaying) {
                    // if we undo after win, reset win flag
                    winAchieved = false;
                    overlayEl.hidden = true;
                }
                gameOver = false;
                overlayEl.hidden = true;
                render();
            }

            // ---- keyboard & swipe ----
            function handleKey(e) {
                const key = e.key;
                const arrowMap = {
                    'ArrowUp': moveUp,
                    'ArrowDown': moveDown,
                    'ArrowLeft': moveLeft,
                    'ArrowRight': moveRight
                };
                if (arrowMap[key]) {
                    e.preventDefault();
                    if (!gameOver && !overlayEl.hidden && winAchieved && !keepPlaying) {
                        // if win overlay shown, block moves
                        return;
                    }
                    if (gameOver) return;
                    arrowMap[key]();
                }
            }

            // ---- touch swipe ----
            let startX = 0,
                startY = 0;
            function handleTouchStart(e) {
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
            }

            function handleTouchEnd(e) {
                if (startX === 0 && startY === 0) return;
                if (gameOver) return;
                if (!overlayEl.hidden && winAchieved && !keepPlaying) return;
                const touch = e.changedTouches[0];
                const dx = touch.clientX - startX;
                const dy = touch.clientY - startY;
                const absDx = Math.abs(dx);
                const absDy = Math.abs(dy);
                if (Math.max(absDx, absDy) < 30) return;
                if (absDx > absDy) {
                    dx > 0 ? moveRight() : moveLeft();
                } else {
                    dy > 0 ? moveDown() : moveUp();
                }
                startX = 0;
                startY = 0;
            }

            // ---- init ----
            function init() {
                bestScoreEl.textContent = bestScore;
                initGrid();
                // event listeners
                window.addEventListener('keydown', handleKey);
                const container = document.getElementById('board-container');
                container.addEventListener('touchstart', handleTouchStart, { passive: true });
                container.addEventListener('touchend', handleTouchEnd, { passive: true });

                document.getElementById('new-game-btn').addEventListener('click', function() {
                    initGrid();
                    overlayEl.hidden = true;
                    winAchieved = false;
                    keepPlaying = false;
                    gameOver = false;
                });
                document.getElementById('undo-btn').addEventListener('click', undoMove);

                // dpad buttons
                document.querySelectorAll('.dpad-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.preventDefault();
                        const dir = this.getAttribute('data-dir');
                        if (gameOver) return;
                        if (!overlayEl.hidden && winAchieved && !keepPlaying) return;
                        if (dir === 'up') moveUp();
                        else if (dir === 'down') moveDown();
                        else if (dir === 'left') moveLeft();
                        else if (dir === 'right') moveRight();
                    });
                });
                // overlay button is set dynamically
            }

            init();
        })();
    </script>
</body>
</html>
